<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallitude — Your Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:    #121212;
      --cream:  #f6f3ee;
      --gold:   #b89a5a;
      --muted:  #7a7a7a;
      --border: #ddd8cf;
      --white:  #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100dvh; }
    a { text-decoration: none; color: inherit; }
    .header-logo-img { height: 28px; width: auto; display: block; }

    /* HEADER */
    .header {
      background: var(--ink); height: 58px;
      display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
    }
    .header-logo { font-weight: 300; font-size: 17px; letter-spacing: .32em; text-transform: uppercase; color: #fff; }
    .nav-back { font-size: 12px; color: rgba(255,255,255,.6); letter-spacing: .06em; transition: color .15s; }
    .nav-back:hover { color: #fff; }

    /* PAGE */
    .page { max-width: 720px; margin: 0 auto; padding: 40px 18px 80px; }
    .page-title { font-size: 20px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; margin-bottom: 36px; text-align: center; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 80px 20px;
    }
    .empty-state svg { margin: 0 auto 20px; opacity: .25; }
    .empty-state p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .btn-outline {
      display: inline-block; padding: 13px 36px;
      border: 1.5px solid var(--ink); background: transparent;
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase; cursor: pointer; transition: background .2s, color .2s;
      color: var(--ink);
    }
    .btn-outline:hover { background: var(--ink); color: #fff; }

    /* CART ITEM */
    .cart-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }

    .cart-item {
      background: var(--white); border: 1px solid var(--border); border-radius: 8px;
      display: flex; gap: 16px; padding: 16px; align-items: flex-start;
    }

    .item-preview {
      width: 80px; height: 100px; flex-shrink: 0; overflow: hidden;
      border: 5px solid #111; background: #f0ede6;
    }
    .item-preview img { width: 100%; height: 100%; object-fit: cover; }

    .item-details { flex: 1; }
    .item-title { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
    .item-meta { font-size: 12px; color: var(--muted); line-height: 1.7; }
    .item-price { font-size: 16px; font-weight: 600; margin-top: 10px; }

    .item-remove {
      background: none; border: none; cursor: pointer; color: #bbb;
      padding: 4px; transition: color .15s; flex-shrink: 0;
    }
    .item-remove:hover { color: #e44; }

    /* SUMMARY */
    .summary {
      background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 24px;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-row.total { font-size: 16px; font-weight: 700; padding-top: 16px; }
    .summary-row .label { color: var(--muted); }
    .summary-row.total .label { color: var(--ink); }

    .btn-checkout {
      display: block; width: 100%; margin-top: 20px; padding: 16px;
      background: var(--ink); color: #fff;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      border: none; border-radius: 8px; cursor: pointer; transition: opacity .15s;
      text-align: center;
    }
    .btn-checkout:hover { opacity: .82; }

    .continue-link { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: var(--muted); letter-spacing: .06em; }
    .continue-link:hover { color: var(--ink); }

    @media (max-width: 480px) {
      .header { padding: 0 16px; }
      .item-preview { width: 64px; height: 80px; }
    }
  </style>

  <!-- ── Meta Pixel ─────────────────────────────────────────── -->
  <!-- SETUP: Replace YOUR_PIXEL_ID below with your actual Pixel ID -->
  <!-- Find it at: business.facebook.com → Events Manager → Your Pixel -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1367586455178175');
    fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"
  /></noscript>
  <!-- ── End Meta Pixel ─────────────────────────────────────── -->
</head>
<body>

  <header class="header">
    <a href="index.html"><img src="images/logo-wordmark.png" alt="Wallitude" class="header-logo-img"></a>
    <a href="tracking.html" class="nav-back" style="margin-right:12px;">Track Order</a>
    <a href="product.html" class="nav-back">+ Add another frame</a>
  </header>

  <main class="page">
    <h1 class="page-title">Your Cart</h1>

    <!-- Empty state (shown when cart is empty) -->
    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="64" height="64" viewBox="0 0 22 22" fill="none">
        <path d="M2 2h2l2.68 11.39a2 2 0 0 0 1.95 1.61h7.72a2 2 0 0 0 1.97-1.69l1.18-7.62H5" stroke="#121212" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9" cy="19" r="1.2" fill="#121212"/>
        <circle cx="17" cy="19" r="1.2" fill="#121212"/>
      </svg>
      <p>Your cart is empty.<br>Create your first custom frame!</p>
      <a href="product.html" class="btn-outline">Create a frame</a>
    </div>

    <!-- Cart items list -->
    <div class="cart-list" id="cartList"></div>

    <!-- Order summary -->
    <div class="summary" id="summaryBox" style="display:none">
      <div class="summary-row">
        <span class="label">Items</span>
        <span id="summaryCount">0</span>
      </div>
      <div class="summary-row">
        <span class="label">Shipping</span>
        <span style="color:#4a9e6b;font-weight:500">FREE</span>
      </div>
      <div class="summary-row total">
        <span class="label">Total</span>
        <span id="summaryTotal">₹0</span>
      </div>
      <a href="checkout.html" class="btn-checkout" onclick="if(typeof fbq==='function'){fbq('track','InitiateCheckout');}">Proceed to Checkout</a>
      <a href="product.html" class="continue-link">Continue shopping</a>
    </div>
  </main>

  <script src="js/cart.js"></script>
  <script>
    // ── Render cart ──────────────────────────────────────────────
    function renderCart() {
      const items   = Cart.getItems();
      const list    = document.getElementById('cartList');
      const empty   = document.getElementById('emptyState');
      const summary = document.getElementById('summaryBox');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display   = 'block';
        summary.style.display = 'none';
        return;
      }

      empty.style.display   = 'none';
      summary.style.display = 'block';

      items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'cart-item';

        const textDesc = item.textLine2a
          ? `${item.textLine2a}${item.textLine2b ? ' · ' + item.textLine2b : ''}`
          : item.textLine1 || '—';

        el.innerHTML = `
          <div class="item-preview">
            ${item.previewDataUrl
              ? `<img src="${item.previewDataUrl}" alt="Frame preview">`
              : `<div style="width:100%;height:100%;background:#e9e5dc;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999">Preview</div>`
            }
          </div>
          <div class="item-details">
            <p class="item-title">Custom Frame — Layout ${item.layout}</p>
            <p class="item-meta">
              Size: ${item.size}<br>
              Text: ${textDesc}<br>
              Images: ${(item.imageFiles || []).length} photo${(item.imageFiles || []).length !== 1 ? 's' : ''}
            </p>
            <p class="item-price">₹${item.price.toLocaleString('en-IN')}</p>
          </div>
          <button class="item-remove" onclick="removeItem('${item.cartId}')" aria-label="Remove item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        `;
        list.appendChild(el);
      });

      // Update summary
      document.getElementById('summaryCount').textContent = `${items.length} frame${items.length > 1 ? 's' : ''}`;
      document.getElementById('summaryTotal').textContent  = `₹${Cart.getTotal().toLocaleString('en-IN')}`;
    }

    function removeItem(cartId) {
      Cart.removeItem(cartId);
      renderCart();
    }

    // Initial render + live updates
    renderCart();
    window.addEventListener('cart:updated', renderCart);
  </script>

</body>
</html>
