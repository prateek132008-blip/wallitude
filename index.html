<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallitude - Design Your Frame</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    @font-face {
      font-family: "Canela";
      src: local("Canela");
      font-display: swap;
    }

    :root {
      --bg: #f6f4ef;
      --ink: #121212;
      --muted: #6d6d6d;
      --line: #dad6cd;
      --card: #ffffff;
      --accent: #111111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .brand {
      margin-bottom: 14px;
    }

    .brand h1 {
      margin: 0;
      font-family: "Canela", "Times New Roman", serif;
      font-weight: 400;
      font-size: 36px;
      letter-spacing: 0.3px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid #e8e4db;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .title {
      margin: 0 0 12px;
      font-size: 17px;
      font-weight: 600;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .field input,
    .field select,
    .field textarea,
    button {
      width: 100%;
      border: 1px solid #ddd8cf;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: "Inter", sans-serif;
      background: #fff;
      color: var(--ink);
    }

    .field textarea {
      min-height: 74px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    .btn.secondary {
      background: #fff;
      color: var(--ink);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    #canvas {
      display: block;
      width: 100%;
      max-width: 760px;
      margin: 10px auto 0;
      border: 14px solid #111;
      background: #f8f6f2;
      cursor: grab;
      border-radius: 2px;
    }

    #canvas.dragging { cursor: grabbing; }

    .status {
      font-size: 13px;
      margin-top: 8px;
      color: var(--muted);
      min-height: 18px;
    }

    .success {
      background: #eef8ee;
      border: 1px solid #cde8cd;
      color: #1f5b1f;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 14px;
      display: none;
    }

    .warn {
      color: #8a5d10;
    }

    @media (max-width: 760px) {
      .grid-2 { grid-template-columns: 1fr; }
      .brand h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <h1>Wallitude</h1>
      <p>Frame your favorite memory with the weight it deserves.</p>
    </div>

    <div class="card">
      <h2 class="title">1) Design Preview</h2>

      <div class="grid-2">
        <div class="field">
          <label for="layoutSelect">Layout</label>
          <select id="layoutSelect">
            <option value="1">Layout 1 - Single Image</option>
            <option value="2">Layout 2 - 3 Images</option>
            <option value="3">Layout 3 - 4 Images (A)</option>
            <option value="4">Layout 4 - 4 Images (B)</option>
          </select>
        </div>

        <div class="field">
          <label for="textMode">Bottom Text</label>
          <select id="textMode">
            <option value="yes">Add Text</option>
            <option value="no">No Text</option>
          </select>
        </div>
      </div>

      <div class="grid-2" style="margin-top:10px;">
        <div class="field">
          <label for="bottomText">Text Content</label>
          <input id="bottomText" type="text" placeholder="Type your memory line...">
        </div>

        <div class="field">
          <label for="zoomRange">Zoom (selected image box)</label>
          <input id="zoomRange" type="range" min="0.2" max="4" step="0.01" value="1">
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <button id="uploadBtn" class="btn secondary" type="button">Upload to Selected Box</button>
        <input id="filePicker" type="file" accept="image/*" style="display:none;">
        <span class="small" id="selectedInfo">Selected box: 1</span>
      </div>

      <div class="small" style="margin-top:8px;">
        Click a box to select it. Drag image to reposition. Mouse wheel or slider to zoom.
      </div>

      <canvas id="canvas" width="760" height="980"></canvas>
    </div>

    <div class="card">
      <h2 class="title">2) Customer Details</h2>
      <div class="grid-2">
        <div class="field">
          <label for="custName">Full Name</label>
          <input id="custName" type="text" placeholder="Your name">
        </div>
        <div class="field">
          <label for="custEmail">Email</label>
          <input id="custEmail" type="email" placeholder="you@example.com">
        </div>
      </div>

      <div class="grid-2" style="margin-top:10px;">
        <div class="field">
          <label for="custPhone">Mobile Number</label>
          <input id="custPhone" type="tel" placeholder="+91XXXXXXXXXX">
        </div>
        <div class="field">
          <label for="frameSize">Frame Size</label>
          <select id="frameSize">
            <option value="12x18">12x18</option>
            <option value="16x24">16x24</option>
            <option value="20x30">20x30</option>
          </select>
        </div>
      </div>

      <div class="field" style="margin-top:10px;">
        <label for="custAddress">Address</label>
        <textarea id="custAddress" placeholder="Full shipping address"></textarea>
      </div>

      <div class="row" style="margin-top:10px;">
        <button id="saveDraftBtn" type="button" class="btn secondary">Save Draft</button>
        <button id="payBtn" type="button" class="btn">Pay & Place Order</button>
      </div>

      <div id="status" class="status"></div>
      <div id="successBox" class="success"></div>
      <div class="small warn" style="margin-top:8px;">
        Note: Payment/order processing needs backend API endpoints (explained below).
      </div>
    </div>
  </div>

  <script>
    /* =========================
       CONFIG - EDIT THESE 3 LINES
       ========================= */
    const API_BASE = "https://YOUR-BACKEND-URL"; // e.g. https://xyz.functions.supabase.co
    const CREATE_ORDER_ENDPOINT = "/create-order";
    const VERIFY_PAYMENT_ENDPOINT = "/verify-payment";

    /* Optional fallback order id for demo-only mode */
    let demoOrderCounter = Number(localStorage.getItem("wallitude_demo_counter") || 122);

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const layoutSelect = document.getElementById("layoutSelect");
    const textMode = document.getElementById("textMode");
    const bottomTextInput = document.getElementById("bottomText");
    const zoomRange = document.getElementById("zoomRange");
    const uploadBtn = document.getElementById("uploadBtn");
    const filePicker = document.getElementById("filePicker");
    const selectedInfo = document.getElementById("selectedInfo");

    const saveDraftBtn = document.getElementById("saveDraftBtn");
    const payBtn = document.getElementById("payBtn");
    const statusEl = document.getElementById("status");
    const successBox = document.getElementById("successBox");

    const FRAME = 56;
    const BASE_TEXT_BLOCK = 120;
    const GAP = 12;

    let images = [];      // [{ img, scale, x, y, fileName, fileType, fileDataBase64 }]
    let selectedBox = 0;
    let dragging = false;
    let dragStart = { x: 0, y: 0 };

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg || "";
      statusEl.style.color = isError ? "#b42318" : "#6d6d6d";
    }

    function showSuccess(html) {
      successBox.style.display = "block";
      successBox.innerHTML = html;
    }

    function hasText() {
      return textMode.value === "yes";
    }

    function getTextBlockHeight() {
      return hasText() ? BASE_TEXT_BLOCK : 24;
    }

    function getBoxes() {
      const textBlock = getTextBlockHeight();
      const innerX = FRAME;
      const innerY = FRAME;
      const innerW = canvas.width - FRAME * 2;
      const innerH = canvas.height - FRAME * 2 - textBlock;

      const scaleBoost = hasText() ? 1 : 1.07;
      const boostedW = Math.min(innerW * scaleBoost, canvas.width - FRAME * 2);
      const boostedH = Math.min(innerH * scaleBoost, canvas.height - FRAME * 2 - 12);

      const x = innerX + (innerW - boostedW) / 2;
      const y = innerY + (innerH - boostedH) / 2;
      const w = boostedW;
      const h = boostedH;

      if (layoutSelect.value === "1") return [{ x, y, w, h }];

      if (layoutSelect.value === "2") return [
        { x, y, w: w / 2 - GAP / 2, h: h * 0.32 },
        { x: x + w / 2 + GAP / 2, y, w: w / 2 - GAP / 2, h: h * 0.32 },
        { x, y: y + h * 0.36, w, h: h * 0.64 }
      ];

      if (layoutSelect.value === "3") return [
        { x, y, w: w * 0.48, h: h * 0.42 },
        { x, y: y + h * 0.46, w: w * 0.48, h: h * 0.54 },
        { x: x + w * 0.52, y, w: w * 0.48, h: h * 0.31 },
        { x: x + w * 0.52, y: y + h * 0.35, w: w * 0.48, h: h * 0.65 }
      ];

      return [
        { x, y, w: w * 0.48, h },
        { x: x + w * 0.52, y, w: w * 0.48, h: h * 0.31 },
        { x: x + w * 0.52, y: y + h * 0.35, w: w * 0.48, h: h * 0.30 },
        { x: x + w * 0.52, y: y + h * 0.69, w: w * 0.48, h: h * 0.31 }
      ];
    }

    function clampImageToBox(i) {
      const boxes = getBoxes();
      const box = boxes[i];
      const d = images[i];
      if (!d || !box) return;

      const drawW = d.img.width * d.scale;
      const drawH = d.img.height * d.scale;

      const minX = box.x + box.w - drawW;
      const maxX = box.x;
      const minY = box.y + box.h - drawH;
      const maxY = box.y;

      d.x = Math.min(maxX, Math.max(minX, d.x));
      d.y = Math.min(maxY, Math.max(minY, d.y));
    }

    function fitImageInBox(img, box, existingMeta = null) {
      const scale = Math.max(box.w / img.width, box.h / img.height);
      const drawW = img.width * scale;
      const drawH = img.height * scale;

      return {
        img,
        scale,
        x: box.x + (box.w - drawW) / 2,
        y: box.y + (box.h - drawH) / 2,
        fileName: existingMeta?.fileName || null,
        fileType: existingMeta?.fileType || null,
        fileDataBase64: existingMeta?.fileDataBase64 || null
      };
    }

    function draw() {
      const boxes = getBoxes();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f8f6f2";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      boxes.forEach((box, i) => {
        ctx.strokeStyle = i === selectedBox ? "#121212" : "#d6d1c8";
        ctx.lineWidth = i === selectedBox ? 2 : 1;
        ctx.strokeRect(box.x, box.y, box.w, box.h);

        if (!images[i]) {
          ctx.fillStyle = "#ece8de";
          ctx.fillRect(box.x + 1, box.y + 1, box.w - 2, box.h - 2);
          ctx.fillStyle = "#8a8379";
          ctx.font = "14px Inter";
          ctx.textAlign = "center";
          ctx.fillText("Box " + (i + 1), box.x + box.w / 2, box.y + box.h / 2);
          return;
        }

        const d = images[i];
        ctx.save();
        ctx.beginPath();
        ctx.rect(box.x, box.y, box.w, box.h);
        ctx.clip();
        ctx.drawImage(d.img, d.x, d.y, d.img.width * d.scale, d.img.height * d.scale);
        ctx.restore();
      });

      if (hasText()) {
        const lineY = canvas.height - FRAME - 60;
        ctx.beginPath();
        ctx.moveTo(FRAME + 120, lineY);
        ctx.lineTo(canvas.width - FRAME - 120, lineY);
        ctx.strokeStyle = "#121212";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = "#121212";
        ctx.font = '26px "Canela", "Times New Roman", serif';
        ctx.textAlign = "center";
        ctx.fillText(bottomTextInput.value || "", canvas.width / 2, lineY + 36);
      }
    }

    function resetForLayout() {
      const boxes = getBoxes();
      const next = [];

      for (let i = 0; i < boxes.length; i++) {
        if (images[i]?.img) {
          next[i] = fitImageInBox(images[i].img, boxes[i], images[i]);
        } else {
          next[i] = null;
        }
      }

      images = next;
      if (selectedBox >= boxes.length) selectedBox = boxes.length - 1;
      if (selectedBox < 0) selectedBox = 0;

      selectedInfo.textContent = "Selected box: " + (selectedBox + 1);
      zoomRange.value = images[selectedBox] ? images[selectedBox].scale : 1;
      draw();
    }

    function selectBoxAt(mx, my) {
      const boxes = getBoxes();
      for (let i = 0; i < boxes.length; i++) {
        const b = boxes[i];
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          selectedBox = i;
          selectedInfo.textContent = "Selected box: " + (selectedBox + 1);
          zoomRange.value = images[i] ? images[i].scale : 1;
          draw();
          return i;
        }
      }
      return -1;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const b64 = result.includes(",") ? result.split(",")[1] : result;
          resolve(b64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function getCustomerData() {
      return {
        name: document.getElementById("custName").value.trim(),
        email: document.getElementById("custEmail").value.trim(),
        phone: document.getElementById("custPhone").value.trim(),
        frameSize: document.getElementById("frameSize").value,
        address: document.getElementById("custAddress").value.trim()
      };
    }

    function getDesignState() {
      const boxes = getBoxes();
      return {
        layout: layoutSelect.value,
        textMode: textMode.value,
        bottomText: hasText() ? (bottomTextInput.value || "") : "",
        boxes: boxes.map((b, i) => ({
          boxIndex: i + 1,
          box: { x: b.x, y: b.y, w: b.w, h: b.h },
          image: images[i] ? {
            x: images[i].x,
            y: images[i].y,
            scale: images[i].scale,
            fileName: images[i].fileName,
            fileType: images[i].fileType,
            fileDataBase64: images[i].fileDataBase64
          } : null
        }))
      };
    }

    function validateBeforePay() {
      const c = getCustomerData();
      if (!c.name || !c.email || !c.phone || !c.address) {
        return "Please fill all customer details.";
      }
      if (!/^\S+@\S+\.\S+$/.test(c.email)) {
        return "Please enter a valid email.";
      }
      const hasAtLeastOneImage = images.some(Boolean);
      if (!hasAtLeastOneImage) {
        return "Please upload at least one image.";
      }
      return "";
    }

    async function createOrderOnBackend(payload) {
      const res = await fetch(API_BASE + CREATE_ORDER_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || "create-order failed");
      }
      return res.json();
    }

    async function verifyPaymentOnBackend(payload) {
      const res = await fetch(API_BASE + VERIFY_PAYMENT_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || "verify-payment failed");
      }
      return res.json();
    }

    function fallbackDemoOrderId() {
      demoOrderCounter += 1;
      localStorage.setItem("wallitude_demo_counter", String(demoOrderCounter));
      return "#WLF" + demoOrderCounter;
    }

    uploadBtn.addEventListener("click", () => {
      filePicker.value = "";
      filePicker.click();
    });

    filePicker.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      try {
        setStatus("Preparing image...");
        const b64 = await fileToBase64(file);

        const boxes = getBoxes();
        const box = boxes[selectedBox];
        if (!box) return;

        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            images[selectedBox] = fitImageInBox(img, box, {
              fileName: file.name,
              fileType: file.type || "image/jpeg",
              fileDataBase64: b64
            });
            zoomRange.value = images[selectedBox].scale;
            draw();
            setStatus("Image uploaded to box " + (selectedBox + 1) + ".");
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      } catch (err) {
        setStatus("Image upload failed.", true);
      }
    });

    canvas.addEventListener("mousedown", (e) => {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * sx;
      const my = (e.clientY - rect.top) * sy;

      const hit = selectBoxAt(mx, my);
      if (hit >= 0 && images[hit]) {
        dragging = true;
        dragStart = { x: mx, y: my };
        canvas.classList.add("dragging");
      }
    });

    window.addEventListener("mouseup", () => {
      dragging = false;
      canvas.classList.remove("dragging");
    });

    canvas.addEventListener("mousemove", (e) => {
      if (!dragging || !images[selectedBox]) return;

      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * sx;
      const my = (e.clientY - rect.top) * sy;

      const dx = mx - dragStart.x;
      const dy = my - dragStart.y;
      dragStart = { x: mx, y: my };

      images[selectedBox].x += dx;
      images[selectedBox].y += dy;
      clampImageToBox(selectedBox);
      draw();
    });

    canvas.addEventListener("wheel", (e) => {
      if (!images[selectedBox]) return;
      e.preventDefault();

      const d = images[selectedBox];
      d.scale = Math.max(0.2, Math.min(4, d.scale + e.deltaY * -0.0015));
      clampImageToBox(selectedBox);
      zoomRange.value = d.scale;
      draw();
    }, { passive: false });

    zoomRange.addEventListener("input", () => {
      if (!images[selectedBox]) return;
      images[selectedBox].scale = parseFloat(zoomRange.value);
      clampImageToBox(selectedBox);
      draw();
    });

    layoutSelect.addEventListener("change", resetForLayout);
    textMode.addEventListener("change", () => {
      bottomTextInput.disabled = !hasText();
      if (!hasText()) bottomTextInput.value = "";
      resetForLayout();
    });
    bottomTextInput.addEventListener("input", draw);

    saveDraftBtn.addEventListener("click", () => {
      const draft = {
        customer: getCustomerData(),
        design: getDesignState(),
        createdAt: new Date().toISOString()
      };
      localStorage.setItem("wallitude_order_draft", JSON.stringify(draft));
      setStatus("Draft saved on this device.");
    });

    payBtn.addEventListener("click", async () => {
      successBox.style.display = "none";
      const validationError = validateBeforePay();
      if (validationError) {
        setStatus(validationError, true);
        return;
      }

      const payload = {
        customer: getCustomerData(),
        design: getDesignState(),
        currency: "INR"
      };

      try {
        payBtn.disabled = true;
        setStatus("Creating order...");

        // Try backend
        const orderData = await createOrderOnBackend(payload);

        if (!window.Razorpay) {
          throw new Error("Razorpay SDK not loaded.");
        }

        const options = {
          key: orderData.keyId,
          amount: orderData.amount,
          currency: orderData.currency || "INR",
          name: "Wallitude",
          description: "Premium Framed Memory",
          order_id: orderData.razorpayOrderId,
          prefill: {
            name: payload.customer.name,
            email: payload.customer.email,
            contact: payload.customer.phone
          },
          handler: async function (resp) {
            try {
              setStatus("Verifying payment...");

              const verifyResp = await verifyPaymentOnBackend({
                razorpay_order_id: resp.razorpay_order_id,
                razorpay_payment_id: resp.razorpay_payment_id,
                razorpay_signature: resp.razorpay_signature,
                public_order_id: orderData.publicOrderId
              });

              setStatus("");
              showSuccess(
                "Thank you for your order.<br>" +
                "Order ID: <b>" + (verifyResp.publicOrderId || orderData.publicOrderId) + "</b><br>" +
                "A confirmation will be sent to your email."
              );
            } catch (err) {
              setStatus("Payment done but verification failed. Please contact support.", true);
            } finally {
              payBtn.disabled = false;
            }
          },
          theme: { color: "#121212" }
        };

        const rzp = new Razorpay(options);
        rzp.on("payment.failed", function (response) {
          setStatus("Payment failed: " + (response.error?.description || "Unknown error"), true);
          payBtn.disabled = false;
        });
        rzp.open();

      } catch (err) {
        // Demo fallback mode if backend not ready
        const demoId = fallbackDemoOrderId();
        localStorage.setItem("wallitude_last_demo_order", JSON.stringify({
          orderId: demoId,
          payload,
          createdAt: new Date().toISOString()
        }));

        setStatus("Backend not connected. Saved as demo order locally.", false);
        showSuccess(
          "Demo order saved (no real payment yet).<br>" +
          "Temporary Order ID: <b>" + demoId + "</b>"
        );
        payBtn.disabled = false;
      }
    });

    // Init
    resetForLayout();
  </script>
</body>
</html>
