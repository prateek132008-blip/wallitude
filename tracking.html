<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order – Wallitude</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:    #121212;
      --cream:  #f6f3ee;
      --gold:   #b89a5a;
      --muted:  #7a7a7a;
      --border: #ddd8cf;
      --white:  #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }
    img { max-width: 100%; display: block; }
    a   { text-decoration: none; color: inherit; }

    /* ── HEADER ────────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--ink); height: 58px;
      display: flex; align-items: center;
      justify-content: space-between; padding: 0 28px;
    }
    .header-logo-img { height: 28px; width: auto; display: block; }
    .header-right    { display: flex; align-items: center; gap: 14px; }
    .header-contact  {
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.06em; color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.25);
      padding: 6px 14px; border-radius: 3px;
      transition: color .2s, border-color .2s;
    }
    .header-contact:hover { color: #fff; border-color: rgba(255,255,255,0.6); }
    .cart-icon-wrap  { position: relative; color: #fff; }
    .cart-icon-wrap svg { display: block; }
    .cart-badge {
      display: none; position: absolute;
      top: -7px; right: -7px;
      width: 18px; height: 18px;
      background: var(--gold); color: #fff;
      font-size: 10px; font-weight: 600;
      border-radius: 50%;
      align-items: center; justify-content: center;
    }

    /* ── PAGE ──────────────────────────────────────────────────── */
    .page {
      max-width: 600px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }

    .page-title {
      font-size: 24px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      text-align: center; margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: 13px; color: var(--muted);
      text-align: center; margin-bottom: 44px;
    }

    /* ── SEARCH BOX ────────────────────────────────────────────── */
    .search-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 28px 24px;
      margin-bottom: 28px;
    }
    .search-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; display: block;
    }
    .search-row {
      display: flex; gap: 10px;
    }
    .search-input {
      flex: 1; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 14px; font-weight: 500;
      font-family: 'Inter', sans-serif; color: var(--ink);
      background: var(--cream); outline: none;
      text-transform: uppercase; letter-spacing: 0.06em;
      transition: border-color .15s, background .15s;
    }
    .search-input::placeholder { text-transform: none; letter-spacing: 0; color: #bbb; font-weight: 400; }
    .search-input:focus { border-color: var(--ink); background: var(--white); }
    .search-btn {
      padding: 12px 22px;
      background: var(--ink); color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      border: none; border-radius: 6px;
      cursor: pointer; transition: opacity .15s;
      white-space: nowrap;
    }
    .search-btn:hover:not(:disabled) { opacity: 0.82; }
    .search-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── ERROR STATE ───────────────────────────────────────────── */
    .track-error {
      display: none;
      background: #fff0f0; border: 1px solid #f5c0c0;
      border-radius: 8px; padding: 14px 18px;
      font-size: 13px; color: #c44;
      margin-top: 14px;
    }
    .track-error.show { display: block; }


    /* ── FOOTER ────────────────────────────────────────────────── */
    .footer {
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 32px 28px;
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 20px;
    }
    .footer-left   { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.04em; }
    .footer-logo   { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .footer-logo-img { height: 52px; width: auto; display: block; opacity: 0.85; }
    .footer-links  {
      display: flex; gap: 20px;
      font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.04em;
    }
    .footer-links a:hover { color: rgba(255,255,255,0.8); }

    /* ── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .header { padding: 0 16px; }
      .header-contact { padding: 5px 10px; font-size: 11px; }
      .page { padding: 36px 14px 60px; }
      .search-card { padding: 20px 16px; }
      .search-row  { flex-direction: column; }
      .search-btn  { width: 100%; }
      .tl-label    { font-size: 9px; }
      .footer { flex-direction: column; align-items: flex-start; }
    }
  </style>

  <!-- ── Meta Pixel ─────────────────────────────────────────── -->
  <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1367586455178175');
    fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1367586455178175&ev=PageView&noscript=1"
  /></noscript>
  <!-- ── End Meta Pixel ─────────────────────────────────────── -->
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────────────── -->
  <header class="header">
    <a href="index.html">
      <img src="images/logo-wordmark.png" alt="Wallitude" class="header-logo-img">
    </a>
    <div class="header-right">
      <a href="https://wa.me/916287656368?text=Hi%2C%20I%20have%20a%20query%20about%20Wallitude%20frames."
         class="header-contact" target="_blank" rel="noopener">Contact us</a>
      <a href="cart.html" class="cart-icon-wrap" aria-label="View cart">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M2 2h2l2.68 11.39a2 2 0 0 0 1.95 1.61h7.72a2 2 0 0 0 1.97-1.69l1.18-7.62H5"
                stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9"  cy="19" r="1.2" fill="#fff"/>
          <circle cx="17" cy="19" r="1.2" fill="#fff"/>
        </svg>
        <span class="cart-badge">0</span>
      </a>
    </div>
  </header>

  <!-- ── MAIN ────────────────────────────────────────────────── -->
  <main class="page">

    <h1 class="page-title">Track Your Order</h1>
    <p class="page-subtitle">Enter your Order ID and we'll connect you via WhatsApp</p>

    <!-- Search card -->
    <div class="search-card">
      <label class="search-label" for="orderIdInput">Order ID</label>
      <div class="search-row">
        <input
          type="text"
          id="orderIdInput"
          class="search-input"
          placeholder="e.g. WT-ABC123-XY45"
          maxlength="30"
          autocomplete="off"
        >
        <button class="search-btn" id="trackBtn" onclick="trackOrder()">Track on WhatsApp</button>
      </div>
      <div class="track-error" id="trackError"></div>
    </div>

  </main>

  <!-- ── FOOTER ──────────────────────────────────────────────── -->
  <footer class="footer">
    <span class="footer-left">Contact us : <a href="mailto:info@wallitude.com" style="color:inherit">info@wallitude.com</a> &nbsp;|&nbsp;
      <a href="https://instagram.com/wallitude.co" target="_blank" rel="noopener" style="color:inherit">Instagram</a>
    </span>
    <div class="footer-logo">
      <img src="images/logo-full.png" alt="Wallitude" class="footer-logo-img">
    </div>
    <div class="footer-links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="return-replacement-policy.html">Return Policy</a>
      <a href="shipping-policy.html">Shipping Policy</a>
    </div>
  </footer>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="js/cart.js"></script>
  <script>
    // ── Pre-fill Order ID from URL param (?orderId=WT-...) ───────
    window.addEventListener('DOMContentLoaded', function() {
      var params  = new URLSearchParams(window.location.search);
      var orderId = params.get('orderId');
      if (orderId) {
        document.getElementById('orderIdInput').value = orderId.toUpperCase();
      }
    });

    // ── WhatsApp redirect ────────────────────────────────────────
    function trackOrder() {
      var input   = document.getElementById('orderIdInput');
      var errEl   = document.getElementById('trackError');
      var orderId = input.value.trim().toUpperCase();

      // Reset error
      errEl.classList.remove('show');

      // Validation — cannot be empty
      if (!orderId) {
        errEl.textContent = 'Please enter your Order ID.';
        errEl.classList.add('show');
        input.focus();
        return;
      }

      // Build pre-filled WhatsApp message
      var message =
        'Hello, I would like to check the status of my order.' +
        '\nMy Order ID is: ' + orderId +
        '\nKindly provide an update. Thank you.';

      // Redirect to WhatsApp with encoded message
      var waUrl = 'https://wa.me/916287656368?text=' + encodeURIComponent(message);
      window.open(waUrl, '_blank');
    }

    // ── Enter key triggers track ─────────────────────────────────
    document.getElementById('orderIdInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') trackOrder();
    });

    // ── Auto-uppercase input ─────────────────────────────────────
    document.getElementById('orderIdInput').addEventListener('input', function() {
      var pos = this.selectionStart;
      this.value = this.value.toUpperCase();
      this.setSelectionRange(pos, pos);
    });
  </script>

</body>
</html>
